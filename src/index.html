<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compression-App</title>
  </head>
  <body style="background-color: rgb(95, 95, 95)">
    <h1>Hello world!</h1>
    <form
      action="/compress"
      method="post"
      id="myForm"
      enctype="multipart/form-data"
      style="display: flex; flex-direction: column; gap: 10px"
    >
      <div style="display: flex; flex-direction: column-reverse; gap: 10px">
        <div>
          <label for="file">File Name:</label>
          <input type="file" id="file" name="file" />
        </div>

        <div>
          <label for="formatType">Format: </label>
          <select name="compressionType" id="formatType">
            <option value="gzip">gzip</option>
            <option value="deflate">deflate</option>
            <option value="br">br</option>
          </select>
        </div>
      </div>

      <button type="submit" style="width: 300px; height: 30px">Send</button>
    </form>
  </body>
</html>
