<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compression Application</title>
  </head>
  <body>
    <h1>File Compression</h1>
    <form action="/compress" method="post" enctype="multipart/form-data">
      <label for="file">Select a file:</label>
      <input type="file" id="file" name="file" required /><br /><br />

      <label for="compressionType">Select compression type:</label>
      <select id="compressionType" name="compressionType" required>
        <option value="gzip">gzip</option>
        <option value="deflate">deflate</option>
        <option value="br">brotli</option></select
      ><br /><br />

      <button type="submit">Compress</button>
    </form>
  </body>
</html>
